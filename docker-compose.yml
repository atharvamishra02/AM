version: '3.8'

services:
  backend:
    image: ghcr.io/atharvamishra02/am/backend:latest
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: am_portfolio_backend
    restart: always
    environment:
      - PORT=5000
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    expose:
      - "5000"

  frontend:
    image: ghcr.io/atharvamishra02/am/frontend:latest
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: am_portfolio_frontend
    restart: always
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
